version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres_url
    restart: unless-stopped

    ports:
      - "5435:5432"

    environment:
      POSTGRES_DB: smart_platform_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
